# WHY: ClusterIssuer is the central configuration for Let's Encrypt.
# It tells cert-manager: "When someone requests a Certificate, contact
# Let's Encrypt and use DNS01 challenge via the Hetzner webhook."
# ClusterIssuer (not Issuer) means: works in all namespaces.

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: cert-manager-webhook-hetzner
    app.kubernetes.io/component: clusterissuer
spec:
  acme:
    # WHY: Let's Encrypt Production server. There's also a Staging server
    # (acme-staging-v02.api.letsencrypt.org) with no rate limits.
    # Use Staging for testing, Production for real certificates!
    server: https://acme-v02.api.letsencrypt.org/directory

    # WHY: Let's Encrypt sends expiration warnings to this email.
    # Important: Should be a real, monitored email address!
    email: admin@homehill.de

    # WHY: Let's Encrypt issues an account key, stored here.
    # This Secret is automatically created by cert-manager - we don't
    # need to create it manually. The key is important for renewals!
    privateKeySecretRef:
      name: letsencrypt-key-prod

    solvers:
      # WHY: DNS01 challenge is perfect for wildcard certs and when port 80
      # is not reachable. Let's Encrypt checks: "Can you set a TXT record
      # at _acme-challenge.homehill.de?" If yes: You own the domain!
      - dns01:
          webhook:
            # WHY: solverName connects this solver to the webhook Pod.
            # The webhook registers itself with cert-manager under this name.
            solverName: hetzner

            # WHY: groupName MUST match values.yaml!
            # This is the "key" that binds webhook and ClusterIssuer together.
            groupName: acme.homehill.de

            config:
              # WHY: References the Secret containing Hetzner DNS API token.
              # The webhook uses this token to create/delete DNS TXT records
              # for ACME DNS01 challenge validation.
              secretName: hetzner
              zoneName: homehill.de
              apiUrl: https://api.hetzner.cloud/v1
