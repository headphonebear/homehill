---
# IngressRoute: HTTP → HTTPS Redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-http
  namespace: longhorn-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`longhorn.homehill.de`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik
      services:
        - name: longhorn-frontend
          port: 80

---
# IngressRoute: HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-https
  namespace: longhorn-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`longhorn.homehill.de`)
      kind: Rule
      services:
        - name: longhorn-frontend
          port: 80
  tls:
    secretName: homehill-wildcard-tls
