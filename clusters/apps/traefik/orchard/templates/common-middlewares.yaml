# clusters/apps/traefik/orchard/templates/common-middlewares.yaml

---
# Redirect HTTP → HTTPS
# Usage: traefik-redirect-https@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# Security Headers
# Usage: traefik-security-headers@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: traefik
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    frameDeny: true
    customResponseHeaders:
      X-Robots-Tag: "noindex,nofollow"
      Server: ""